<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Search App</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}


body{

    min-height:100vh;
    background:#f5f5f5;

    display:flex;
    flex-direction:column;
    align-items:center;

    padding:40px 20px;

}



header{

    width:100%;
    max-width:800px;
    text-align:center;

}



header h1{

    color:#555;
    text-transform:uppercase;
    margin-bottom:25px;

}



.search-container{

    position:relative;

}



.search-container input{

    width:100%;

    padding:15px 55px 15px 20px;

    border:none;

    outline:none;

    border-radius:30px;

    font-size:18px;

    background:white;

    box-shadow:0 3px 10px rgba(0,0,0,0.15);

}



.material-icons{

    position:absolute;

    right:18px;
    top:13px;

    color:#555;

    cursor:pointer;

    font-size:30px;

}



main{

    width:100%;

}



section{

    display:flex;

    flex-direction:column;

    align-items:center;

}



.images-container{

    margin-top:50px;

    display:flex;

    justify-content:center;

    flex-wrap:wrap;

    gap:20px;

}



.imageDiv{

    width:300px;

    height:280px;

    position:relative;

    overflow:hidden;

    border-radius:12px;

    background:white;

}



.imageDiv img{

    width:100%;

    height:100%;

    object-fit:cover;

}



.overlay{

    position:absolute;

    bottom:0;

    left:0;

    width:100%;

    height:0;

    background:rgba(0,0,0,0.7);

    display:flex;

    justify-content:center;

    align-items:center;

    transition:0.3s;

}



.imageDiv:hover .overlay{

    height:100%;

}



.overlay h3{

    color:white;

    text-align:center;

    padding:10px;

    display:none;

}



.imageDiv:hover .overlay h3{

    display:block;

}



.loadMoreBtn{

    margin:40px;

    padding:12px 25px;

    background:#20b2aa;

    color:white;

    border:none;

    border-radius:5px;

    font-size:18px;

    cursor:pointer;

    display:none;

}



.loadMoreBtn:hover{

    background:#168f89;

}



@media(max-width:700px){

.imageDiv{

    width:90%;

}

header{

    width:90%;

}

}


</style>

</head>


<body>


<header>


<h1>Image Search App</h1>


<form id="search-form">


<div class="search-container">


<input 
type="text"
id="search-input"
placeholder="Search Images">


<span 
class="material-icons"
id="search-btn">

search

</span>


</div>


</form>


</header>




<main>


<section>


<div class="images-container">

<h2>Search images to display</h2>

</div>


<button class="loadMoreBtn">

Load More

</button>



</section>


</main>





<script>


// Unsplash API KEY

const accessKey = "sPsrql6ZDfYy2FMIOGrK51ON2vDIM4IAP-KBY-G2kLk";



const searchForm = document.getElementById("search-form");

const searchInput = document.getElementById("search-input");

const searchBtn = document.getElementById("search-btn");

const imagesContainer = document.querySelector(".images-container");

const loadMoreBtn = document.querySelector(".loadMoreBtn");



let page = 1;

let query = "";





async function fetchImages(){


try{


const url =
`https://api.unsplash.com/search/photos?query=${query}&page=${page}&per_page=30&client_id=${accessKey}`;



const response = await fetch(url);



if(!response.ok){

throw new Error("API Error: " + response.status);

}



const data = await response.json();




if(page===1){

imagesContainer.innerHTML="";

}




if(data.results.length===0){


imagesContainer.innerHTML =
"<h2>No Images Found</h2>";

loadMoreBtn.style.display="none";

return;


}





data.results.forEach(photo=>{



const imageDiv=document.createElement("div");


imageDiv.className="imageDiv";



imageDiv.innerHTML=`

<img src="${photo.urls.regular}">


<div class="overlay">

<h3>
${photo.alt_description || "Beautiful Image"}
</h3>

</div>

`;



imagesContainer.appendChild(imageDiv);



});






if(page < data.total_pages){

loadMoreBtn.style.display="block";

}

else{

loadMoreBtn.style.display="none";

}




}


catch(error){


console.log(error);


imagesContainer.innerHTML=

`

<h2>
Failed to load images
</h2>

<p>
${error.message}
</p>

`;

}


}







searchForm.addEventListener("submit",(e)=>{


e.preventDefault();



query = searchInput.value.trim();



if(query===""){


imagesContainer.innerHTML=

"<h2>Please enter search text</h2>";

return;


}



page=1;


fetchImages();



});







searchBtn.addEventListener("click",()=>{


searchForm.requestSubmit();


});








loadMoreBtn.addEventListener("click",()=>{


page++;


fetchImages();


});



console.log("Image Search App Loaded");


</script>



</body>
</html>
